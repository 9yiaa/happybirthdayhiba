<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Verification</title>

<style>

body{
background:#faf7fb;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

/* CAPTCHA */

.captcha-container{
background:white;
border:1px solid #dcdcdc;
border-radius:4px;
width:300px;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
cursor:pointer;
}

.left{
display:flex;
align-items:center;
gap:12px;
}

.checkbox{
width:26px;
height:26px;
border:2px solid #e8a8c7;
border-radius:3px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
color:#e8a8c7;
transition:0.3s;
}

.captcha-text{
font-size:15px;
color:#333;
}

.logo{
font-size:10px;
text-align:center;
color:#888;
}

/* LOADING */

.loading{
display:none;
margin-top:25px;
text-align:center;
}

.spinner{
width:38px;
height:38px;
border:4px solid #ffd6e8;
border-top:4px solid #f08bb7;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* QUESTION BOX */

.box{
display:none;
margin-top:30px;
background:white;
padding:25px;
border-radius:10px;
width:280px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
animation:fade 0.5s;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

button{
background:#f7a8c9;
border:none;
padding:10px 16px;
margin:6px;
border-radius:6px;
color:white;
cursor:pointer;
font-size:14px;
transition:0.2s;
}

button:hover{
background:#f38ab5;
}

input{
padding:8px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
width:70%;
}

.error{
color:#ff5a7d;
margin-top:10px;
font-size:13px;
}

</style>
</head>

<body>

<!-- CAPTCHA -->

<div class="captcha-container" onclick="startVerify()">

<div class="left">
<div class="checkbox" id="check"></div>
<div class="captcha-text">I'm not a robot</div>
</div>

<div class="logo">
reCAPTCHA<br>
Privacy - Terms
</div>

</div>

<!-- LOADING -->

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Verifying...</p>
</div>

<!-- QUESTION 1 -->

<div class="box" id="q1">

<p>
قبل ما نتم عملية التحقق…<br>
انتي هبة؟
</p>

<button onclick="next()">ايوه أكيد</button>
<button onclick="next()">لا</button>

</div>

<!-- QUESTION 2 -->

<div class="box" id="q2">

<p>
عشان نتأكد إنك هبة فعلاً…<br>
إيه لونك المفضل؟
</p>

<input id="answer" placeholder="الإجابة هنا">

<br>

<button onclick="check()">تأكيد</button>

<div class="error" id="wrong"></div>

</div>

<script>

function startVerify(){

document.getElementById("check").innerHTML="✔"

document.getElementById("loading").style.display="block"

setTimeout(function(){

document.getElementById("loading").style.display="none"
document.getElementById("q1").style.display="block"

},2000)

}

function next(){

document.getElementById("q1").style.display="none"
document.getElementById("q2").style.display="block"

}

function check(){

let ans=document.getElementById("answer").value.toLowerCase()

if(ans=="pink"){

window.location.href="page2.html"

}

else{

document.getElementById("wrong").innerText="هممم… مش متأكدين إنك هبة 🤨"

}

}

</script>

</body>
</html>
