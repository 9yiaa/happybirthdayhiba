<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Verification</title>

<style>

body{
background:#faf7fb;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

/* CAPTCHA BOX */

.captcha-box{
border:1px solid #ddd;
background:white;
padding:15px 20px;
display:flex;
align-items:center;
gap:12px;
cursor:pointer;
border-radius:6px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.checkbox{
width:24px;
height:24px;
border:2px solid #e8a8c7;
border-radius:4px;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
color:#e8a8c7;
}

.captcha-text{
font-size:16px;
}

/* LOADING */

.loading{
display:none;
margin-top:20px;
text-align:center;
}

.spinner{
width:40px;
height:40px;
border:4px solid #ffd6e8;
border-top:4px solid #f08bb7;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* QUESTION BOX */

.box{
display:none;
margin-top:25px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
width:280px;
}

button{
background:#f7a8c9;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
margin:6px;
color:white;
font-size:14px;
transition:0.2s;
}

button:hover{
background:#f38ab5;
}

input{
padding:8px;
margin-top:10px;
width:70%;
border:1px solid #ddd;
border-radius:6px;
}

.error{
color:#ff5a7d;
margin-top:10px;
font-size:13px;
}

</style>
</head>

<body>

<div class="captcha-box" onclick="startVerify()">
<div class="checkbox" id="check"></div>
<div class="captcha-text">I'm not a robot</div>
</div>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Verifying...</p>
</div>

<div class="box" id="q1">
<p>قبل ما نتم عملية التحقق…<br>انتي هبة؟</p>

<button onclick="next()">ايوه أكيد</button>
<button onclick="next()">لا</button>
</div>

<div class="box" id="q2">
<p>عشان نتأكد إنك هبة فعلاً…<br>إيه لونك المفضل؟</p>

<input id="answer" placeholder="الإجابة هنا">

<br>
<button onclick="check()">تأكيد</button>

<div class="error" id="wrong"></div>

</div>

<script>

function startVerify(){

document.getElementById("check").innerHTML="✓"

document.getElementById("loading").style.display="block"

setTimeout(function(){

document.getElementById("loading").style.display="none"
document.getElementById("q1").style.display="block"

},2000)

}

function next(){

document.getElementById("q1").style.display="none"
document.getElementById("q2").style.display="block"

}

function check(){

let ans=document.getElementById("answer").value.toLowerCase()

if(ans=="pink"){
window.location.href="page2.html"
}

else{
document.getElementById("wrong").innerText="هممم… مش متأكدين إنك هبة 🤨"
}

}

</script>

</body>
</html>
